      <stop offset="0%" stop-color="#1a6b5e"/>
      <stop offset="100%" stop-color="#0f4d43"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4837a"/>
      <stop offset="100%" stop-color="#a86b62"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="550" r="180" fill="#1a6b5e" opacity="0.15"/>
  <circle cx="1100" cy="80" r="120" fill="#2d8b7d" opacity="0.1"/>
  <!-- Brand mark -->
  <text x="100" y="320" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="2">Serenity Spa</text>
  <rect x="100" y="340" width="80" height="3" fill="#c4837a" rx="2"/>
