  <text x="100" y="470" font-family="system-ui, sans-serif" font-size="20" fill="#8a8580">Córdoba · Reservá tu cita online</text>
  <!-- Decorative spa leaf -->
  <path d="M950 380 Q1000 300 1050 380 Q1000 340 950 380Z" fill="#c4837a" opacity="0.3"/>
  <path d="M970 390 Q1020 320 1070 390 Q1020 350 970 390Z" fill="#e8c4be" opacity="0.2"/>
